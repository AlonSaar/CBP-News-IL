name: Deploy on Approval

on:
  push:
    branches: [main]
    paths:
      - 'state/approved_urls.json'
      - 'state/articles.json'
      - 'html_writer.py'

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  regenerate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull latest state before regenerating
        run: git pull --rebase origin main || true

      - name: Regenerate HTML with updated approvals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_PAT: ${{ secrets.GITHUB_PAT }}
        run: python pipeline.py --regenerate-only --verbose

      - name: Copy HTML to docs/ for GitHub Pages
        run: |
          cp output/cbp_hebrew_reviews.html docs/index.html
          echo "cbp-il.click" > docs/CNAME
          echo "Copied HTML to docs/index.html"

      - name: Commit and push
        run: |
          git config user.name  "CBP Bot"
          git config user.email "cbp-bot@users.noreply.github.com"
          git add docs/ output/ state/articles.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Redeploy: approval update $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
            # Retry push up to 3 times — rebase on remote if newer commits exist.
            # In a rebase, --theirs = our commit being replayed (freshly generated files).
            for attempt in 1 2 3; do
              if git push; then
                echo "✓ Pushed on attempt $attempt"; break
              fi
              echo "Push rejected (attempt $attempt) — rebasing on remote..."
              git fetch origin main
              GIT_EDITOR=true git rebase origin/main || {
                git checkout --theirs docs/index.html                  2>/dev/null || true
                git checkout --theirs output/cbp_hebrew_reviews.html   2>/dev/null || true
                git checkout --theirs output/cbp_hebrew_reviews.pptx   2>/dev/null || true
                git add docs/ output/ 2>/dev/null || true
                GIT_EDITOR=true git rebase --continue
              }
            done
          fi
